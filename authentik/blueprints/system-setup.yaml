# authentik/blueprints/system-setup.yaml
version: 1
metadata:
  name: PTalk Ecosystem Setup
  labels:
    blueprints.goauthentik.io/instantiated-by: ptalk-system

entries:
  # 0. Groups for End Users (must be created before being referenced)
  - model: authentik_core.group
    id: group-account-owner
    state: present
    identifiers:
      name: AccountOwner
    attrs:
      is_superuser: false

  - model: authentik_core.group
    id: group-child
    state: present
    identifiers:
      name: Child
    attrs:
      is_superuser: false

  - model: authentik_core.group
    id: group-elder
    state: present
    identifiers:
      name: Elder
    attrs:
      is_superuser: false

  # 1. Groups for Dashboard / Operations
  - model: authentik_core.group
    id: role-super-admin
    state: present
    identifiers:
      name: SuperAdmin
    attrs:
      is_superuser: true

  - model: authentik_core.group
    id: role-product-admin
    state: present
    identifiers:
      name: ProductAdmin
    attrs:
      is_superuser: false

  - model: authentik_core.group
    id: role-support
    state: present
    identifiers:
      name: Support
    attrs:
      is_superuser: false

  - model: authentik_core.group
    id: role-viewer
    state: present
    identifiers:
      name: Viewer
    attrs:
      is_superuser: false

  # 2. Enrollment Flow (Sign Up)
  - model: authentik_flows.flow
    id: flow-enrollment
    state: present
    identifiers:
      slug: default-enrollment-flow
    attrs:
      name: Default Enrollment Flow
      title: Create an Account
      designation: enrollment
      authentication: none

  # Prompt fields for enrollment
  - model: authentik_stages_prompt.prompt
    id: prompt-username
    state: present
    identifiers:
      name: field-username
    attrs:
      field_key: username
      label: Username
      type: text
      placeholder: Enter your username
      required: true
      order: 0

  - model: authentik_stages_prompt.prompt
    id: prompt-email
    state: present
    identifiers:
      name: field-email
    attrs:
      field_key: email
      label: Email
      type: email
      placeholder: Enter your email
      required: true
      order: 1

  - model: authentik_stages_prompt.prompt
    id: prompt-password
    state: present
    identifiers:
      name: field-password-enrollment
    attrs:
      field_key: password
      label: Password
      type: password
      placeholder: Create a password
      required: true
      order: 2

  - model: authentik_stages_prompt.prompt
    id: prompt-password-repeat
    state: present
    identifiers:
      name: field-password-repeat
    attrs:
      field_key: password_repeat
      label: Confirm Password
      type: password
      placeholder: Repeat your password
      required: true
      order: 3

  # Prompt stage for enrollment
  - model: authentik_stages_prompt.promptstage
    id: stage-enrollment-prompt
    state: present
    identifiers:
      name: stage-enrollment-prompt
    attrs:
      fields:
        - !KeyOf prompt-username
        - !KeyOf prompt-email
        - !KeyOf prompt-password
        - !KeyOf prompt-password-repeat

  # Email verification stage
  - model: authentik_stages_email.emailstage
    id: stage-email-verification
    state: present
    identifiers:
      name: stage-email-verification
    attrs:
      activate_user_on_success: true
      use_global_settings: true
      token_expiry_minutes: 30
      subject: "Xac thuc email - PTalk Account"

  # User write stage (create as inactive until email verified)
  - model: authentik_stages_user_write.userwritestage
    id: stage-user-write
    state: present
    identifiers:
      name: stage-user-write-enrollment
    attrs:
      user_creation_mode: always_create
      create_users_as_inactive: true
      create_users_group: !KeyOf group-account-owner

  # User login stage
  - model: authentik_stages_user_login.userloginstage
    id: stage-user-login-enrollment
    state: present
    identifiers:
      name: stage-user-login-enrollment
    attrs:
      session_duration: hours=24

  # Enrollment flow stage bindings
  - model: authentik_flows.flowstagebinding
    id: binding-enrollment-prompt
    state: present
    identifiers:
      target: !KeyOf flow-enrollment
      stage: !KeyOf stage-enrollment-prompt
    attrs:
      order: 10

  - model: authentik_flows.flowstagebinding
    id: binding-email-verification
    state: present
    identifiers:
      target: !KeyOf flow-enrollment
      stage: !KeyOf stage-email-verification
    attrs:
      order: 15

  - model: authentik_flows.flowstagebinding
    id: binding-enrollment-user-write
    state: present
    identifiers:
      target: !KeyOf flow-enrollment
      stage: !KeyOf stage-user-write
    attrs:
      order: 20

  - model: authentik_flows.flowstagebinding
    id: binding-enrollment-user-login
    state: present
    identifiers:
      target: !KeyOf flow-enrollment
      stage: !KeyOf stage-user-login-enrollment
    attrs:
      order: 30

  # 3. Property Map to embed Roles into JWT Claims
  - model: authentik_providers_oauth2.scopemapping
    id: scope-roles
    state: present
    identifiers:
      name: Map Roles to JWT
    attrs:
      scope_name: roles
      description: "Map Authentik groups to 'roles' claim in JWT"
      expression: |
        return {
            "roles": [group.name for group in request.user.ak_groups.all()]
        }

  - model: authentik_providers_oauth2.scopemapping
    id: scope-user-type
    state: present
    identifiers:
      name: Map User Type to JWT
    attrs:
      scope_name: user_type
      description: "Map user_type attribute to 'user_type' claim in JWT"
      expression: |
        return {
            "user_type": request.user.attributes.get("user_type", "dashboard")
        }

  - model: authentik_providers_oauth2.scopemapping
    id: scope-assigned-products
    state: present
    identifiers:
      name: Map Assigned Products to JWT
    attrs:
      scope_name: assigned_products
      description: "Map assigned_products attribute to 'assigned_products' claim in JWT"
      expression: |
        return {
            "assigned_products": request.user.attributes.get("assigned_products", [])
        }

  # 4. OAuth2 / OIDC Providers & Applications
  # 4.1 Kid Mentor
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-kid-mentor
    state: present
    identifiers:
      name: Provider Kid Mentor
    attrs:
      client_id: kid-mentor-client
      client_secret: kid-mentor-secret-key
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      enrollment_flow: !KeyOf flow-enrollment
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf scope-roles
        - !KeyOf scope-user-type
        - !KeyOf scope-assigned-products
      redirect_uris: "http://localhost:3000/api/auth/callback/authentik\napp://kidmentor/callback"
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Default Keypair]]

  - model: authentik_core.application
    id: app-kid-mentor
    state: present
    identifiers:
      name: Kid Mentor App
      slug: kid-mentor
    attrs:
      provider: !KeyOf provider-kid-mentor

  # 4.2 P Assistant
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-p-assistant
    state: present
    identifiers:
      name: Provider P Assistant
    attrs:
      client_id: p-assistant-client
      client_secret: p-assistant-secret-key
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      enrollment_flow: !KeyOf flow-enrollment
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf scope-roles
        - !KeyOf scope-user-type
        - !KeyOf scope-assigned-products
      redirect_uris: "http://localhost:3001/api/auth/callback/authentik\napp://passistant/callback"
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Default Keypair]]

  - model: authentik_core.application
    id: app-p-assistant
    state: present
    identifiers:
      name: P Assistant App
      slug: p-assistant
    attrs:
      provider: !KeyOf provider-p-assistant

  # 4.3 Dashboard
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-dashboard
    state: present
    identifiers:
      name: Provider Dashboard
    attrs:
      client_id: dashboard-client
      client_secret: dashboard-secret-key
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      enrollment_flow: !KeyOf flow-enrollment
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf scope-roles
        - !KeyOf scope-user-type
        - !KeyOf scope-assigned-products
      redirect_uris: "https://dashboard.ctslab.net/api/auth/callback/authentik\nhttp://localhost:4321/api/auth/callback/authentik"
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Default Keypair]]

  - model: authentik_core.application
    id: app-dashboard
    state: present
    identifiers:
      name: Dashboard App
      slug: dashboard
    attrs:
      provider: !KeyOf provider-dashboard
