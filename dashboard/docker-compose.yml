version: '3.8'

services:
  dashboard-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-frontend
    ports:
      - "4321:3000"
    restart: unless-stopped
    env_file:
      - .env
    # Cho phép container resolve host gateway → Neo4j edu (bolt :7688) chạy trên host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # DB connection (override .env here if needed)
      DB_HOST: ${DB_HOST:-192.168.1.1}
      DB_PORT: ${DB_PORT:-5434}
      DB_NAME: ${DB_NAME:-ptalk_auth}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-SecurePassword2024}
      # Knowledge Graph (Neo4j edu, read-only) — env_file đã nạp .env, để đây làm default rõ ràng
      NEO4J_URI: ${NEO4J_URI:-bolt://host.docker.internal:7688}
      NEO4J_USER: ${NEO4J_USER:-dashboard_ro}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      KG_CACHE_TTL_MS: ${KG_CACHE_TTL_MS:-60000}
